name: Build boykisser-clan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        set VCPKG_ROOT=%CD%\vcpkg
        .\vcpkg\vcpkg install --triplet=x64-windows
      shell: cmd
      
    - name: Restore NuGet packages
      run: |
        nuget restore boykisser-clan.sln
      shell: cmd
      
    - name: Build solution
      run: |
        set VCPKG_ROOT=%CD%\vcpkg
        msbuild boykisser-clan.sln /p:Configuration=Release /p:Platform=x64 /verbosity:normal
      shell: cmd
      
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: |
          **/x64/Release/*.exe
          **/Release/*.exe
          boykisserclan/bin/Release/**/*.exe
          boykisserclan/bin/x64/Release/**/*.exe
          build/Release/**/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
