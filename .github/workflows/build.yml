name: Build boykisser-clan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
      shell: cmd

    - name: Build with CMake + vcpkg
      run: |
        cd boykisser-clan
        cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="%CD%\..\vcpkg\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows
        cmake --build build --config Release --verbose
      shell: cmd

    - name: Build C# project
      run: |
        msbuild boykisserclan\boykisserclan.csproj /p:Configuration=Release /p:Platform=x64 /verbosity:normal
      shell: cmd
      working-directory: boykisserclan

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: |
          boykisser-clan/build/Release/boykisser-clan.exe
          boykisserclan/build/Release/net8.0-windows/boykisser-clan.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
