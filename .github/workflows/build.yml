name: Build boykisser-clan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg install --triplet=x64-windows
      shell: cmd

    - name: Restore NuGet packages
      run: |
        nuget restore boykisser-clan.sln
      shell: cmd

    - name: Build C++ project
      run: |
        msbuild boykisser-clan\boykisser-clan.vcxproj /p:Configuration=Release /p:Platform=x64 /p:VcpkgEnableManifest=true /verbosity:normal
      shell: cmd

    - name: Build C# project
      run: |
        msbuild boykisserclan\boykisserclan.csproj /p:Configuration=Release /p:Platform=x64 /verbosity:normal
      shell: cmd
      
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: |
          boykisser-clan\build\Release\boykisser-clan.exe
          boykisserclan\build\Release\net8.0-windows\boykisserclan.exe
          boykisserclan\build\Release\net8.0-windows\boykisserclan.dll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
